{% extends "base.html" %}
{% block title %}Share a Wishlist{% endblock %}
{% block content %}
<div class="page" style="max-width:700px;">
  <a href="{{ url_for('community.community') }}" style="font-size:13px; color:var(--text-soft); text-decoration:none;">← Back to Community</a>
  <h1 class="page-title" style="margin-top:12px;">Share a Dream Trip</h1>
  <p class="page-subtitle">A place you want to go — inspire others and get advice.</p>

  <form method="POST" style="background:var(--white); border-radius:var(--radius); border:1px solid rgba(0,0,0,0.07); padding:32px;">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
      <div class="form-group">
        <label>Title</label>
        <input type="text" name="title" required placeholder="e.g. Dream Trip: Japan in Spring" />
      </div>
      <div class="form-group">
        <label>Destination</label>
        <input type="text" name="destination" required placeholder="e.g. Japan" />
      </div>
      <div class="form-group">
        <label>Estimated Budget ($)</label>
        <input type="number" step="0.01" name="estimated_budget" placeholder="e.g. 2000" />
      </div>
      <div class="form-group">
        <label>Duration (days)</label>
        <input type="number" name="duration_days" placeholder="e.g. 14" />
      </div>
    </div>

    <div class="form-group">
      <label>Description & Tips</label>
      <textarea name="description" rows="4" placeholder="Why do you want to go? What are you most excited about? Any questions for people who've been?"></textarea>
    </div>

    <div style="display:flex; align-items:center; gap:10px; margin-bottom:24px;">
      <input type="checkbox" name="is_public" id="is_public" checked style="width:auto;" />
      <label for="is_public" style="font-size:14px; color:var(--navy); text-transform:none; letter-spacing:0;">Share publicly with the community</label>
    </div>

    <button type="submit" class="btn-primary">Share Wishlist</button>
  </form>
</div>
{% endblock %}
