{% extends "base.html" %}
{% block title %}Create New Trip{% endblock %}
{% block content %}
<div class="page" style="max-width:700px;">
  <a href="{{ url_for('trip.trips') }}" style="font-size:13px; color:var(--text-soft); text-decoration:none;">← Back to My Trips</a>
  <h1 class="page-title" style="margin-top:12px;">Share a Trip</h1>
  <p class="page-subtitle">Your blueprint will help other travelers plan their perfect trip.</p>

  <form method="POST" style="background:var(--white); border-radius:var(--radius); border:1px solid rgba(0,0,0,0.07); padding:32px;" enctype="multipart/form-data">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
      <div class="form-group">
        <label>Trip Name</label>
        <input type="text" name="name" required placeholder="e.g. Georgia in 10 Days" />
      </div>
      <div class="form-group">
        <label>Trip Photo</label>
        <input type="file" name="image" accept="image/*" />
      </div>
      <div class="form-group">
        <label>Destination</label>
        <input type="text" name="destination" required placeholder="e.g. Georgia" />
      </div>
      <div class="form-group">
        <label>Start Date</label>
        <input type="date" name="start_date" />
      </div>
      <div class="form-group">
        <label>End Date</label>
        <input type="date" name="end_date" />
      </div>
      <div class="form-group">
        <label>Total Budget ($)</label>
        <input type="number" step="0.01" name="budget" placeholder="e.g. 600" />
      </div>
      <div class="form-group">
        <label>Duration (days)</label>
        <input type="number" name="duration_days" placeholder="e.g. 10" />
      </div>
    </div>

    <div class="form-group">
      <label>Where to Stay</label>
      <textarea name="accommodation" rows="3" placeholder="Hotels, hostels, Airbnbs — area, price per night, honest thoughts..."></textarea>
    </div>
    <div class="form-group">
      <label>Highlights</label>
      <textarea name="highlights" rows="3" placeholder="Best moments, must-do experiences, what made this trip special..."></textarea>
    </div>
    <div class="form-group">
      <label>Honest Tips</label>
      <textarea name="tips" rows="3" placeholder="Money, transport, food, what to avoid, what nobody tells you..."></textarea>
    </div>

    <div style="display:flex; align-items:center; gap:10px; margin-bottom:24px;">
      <input type="checkbox" name="is_public" id="is_public" style="width:auto;" />
      <label for="is_public" style="font-size:14px; color:var(--navy); text-transform:none; letter-spacing:0;">Make this trip public so others can use it</label>
    </div>

    <button type="submit" class="btn-primary">Save Trip</button>
  </form>
</div>
{% endblock %}
